kind = "web"
previewPath = "/"
title = "Fraganti — Perfumes Originales"
version = "1.0.0"
id = "artifacts/fraganti"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22156

[services.development]
run = "pnpm --filter @workspace/fraganti run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fraganti", "run", "build" ]
serve = "static"
publicDir = "artifacts/fraganti/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22156"
BASE_PATH = "/"
